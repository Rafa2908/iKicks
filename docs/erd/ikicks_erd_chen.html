<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iKicks ERD — Chen Notation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8f044;
    --accent2: #44d4f0;
    --text: #e8e8e8;
    --muted: #666;
    --entity-bg: #1a1a1a;
    --entity-border: #c8f044;
    --rel-bg: #1a1a1a;
    --rel-border: #44d4f0;
    --attr-bg: #111;
    --attr-border: #3a3a3a;
    --line: #333;
    --pk-color: #c8f044;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 40px 32px;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    gap: 24px;
    margin-left: auto;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .legend-box {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--entity-border);
    background: var(--entity-bg);
  }

  .legend-diamond {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--rel-border);
    background: var(--rel-bg);
    transform: rotate(45deg);
  }

  .legend-oval {
    width: 18px;
    height: 12px;
    border: 1px solid var(--attr-border);
    background: var(--attr-bg);
    border-radius: 50%;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-left: 4px;
    border-left: 2px solid var(--accent);
    padding-left: 8px;
  }

  .diagram-section {
    margin-bottom: 60px;
  }

  svg {
    display: block;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  /* Entity rectangle */
  .entity-rect {
    fill: var(--entity-bg);
    stroke: var(--entity-border);
    stroke-width: 1.5;
  }

  /* Relationship diamond */
  .rel-diamond {
    fill: var(--rel-bg);
    stroke: var(--rel-border);
    stroke-width: 1.5;
  }

  /* Attribute oval */
  .attr-oval {
    fill: var(--attr-bg);
    stroke: var(--attr-border);
    stroke-width: 1;
  }

  /* PK underlined attribute oval */
  .attr-oval-pk {
    fill: #161a0e;
    stroke: var(--pk-color);
    stroke-width: 1;
  }

  /* Connector lines */
  .conn {
    stroke: var(--line);
    stroke-width: 1;
    fill: none;
  }

  /* Entity label */
  .entity-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    fill: var(--accent);
    text-anchor: middle;
    dominant-baseline: central;
  }

  /* Relationship label */
  .rel-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    fill: var(--accent2);
    text-anchor: middle;
    dominant-baseline: central;
  }

  /* Attribute label */
  .attr-label {
    font-family: 'IBM Plex Sans', monospace;
    font-size: 10px;
    font-weight: 400;
    fill: #aaa;
    text-anchor: middle;
    dominant-baseline: central;
  }

  /* PK attribute label */
  .attr-label-pk {
    font-family: 'IBM Plex Sans', monospace;
    font-size: 10px;
    font-weight: 500;
    fill: var(--pk-color);
    text-anchor: middle;
    dominant-baseline: central;
    text-decoration: underline;
  }

  /* Cardinality label */
  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    fill: #555;
    text-anchor: middle;
    dominant-baseline: central;
  }
</style>
</head>
<body>

<header>
  <h1>iKicks</h1>
  <span class="subtitle">ERD — Chen Notation</span>
  <div class="legend">
    <div class="legend-item"><div class="legend-box"></div> Entity</div>
    <div class="legend-item"><div class="legend-diamond"></div> Relationship</div>
    <div class="legend-item"><div class="legend-oval"></div> Attribute</div>
  </div>
</header>

<!-- ===== SECTION 1: Users, Cart, Cart_items ===== -->

    <text class="card-label" x="720" y="248">to ORDERS (Section 2)</text>

</div>

<!-- ===== SECTION 3: Shipping, Wishlist ===== -->
